services:
  db:
    image: postgres:16-alpine
    container_name: melhorfilamento-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: melhorfilamento
    ports:
      - "5432:5432"
    volumes:
      - melhorfilamento_pgdata:/var/lib/postgresql/data

volumes:
  melhorfilamento_pgdata:
